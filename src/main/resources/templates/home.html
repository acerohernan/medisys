<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inicio | Medisys</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GNH9XQCqmHMPQZ3l7N3j1k22aZz+1bI4Yw0MeHBlw2jEJOeV2kP/dsFWZziIFOFN" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Medisys</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container py-5">
    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="card-title">Bienvenido, <span th:text="${username}">Usuario</span></h1>
            <p class="text-muted">Has iniciado sesión correctamente.</p>
            <div class="mb-3">
                <strong>Roles asignados:</strong>
                <ul>
                    <li th:each="role : ${roles}" th:text="${role.authority}">ROLE_USER</li>
                </ul>
            </div>
            <div class="alert alert-info">
                <p>Para acceder a funciones administrativas, visite <a th:href="@{/admin}" class="alert-link">/admin</a> si su rol lo permite.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
