<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
  <head>
    <title layout:title-pattern="$CONTENT_TITLE - MediSys">MediSys</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/sidebar.css}" />
  </head>
  <body>
    <!-- ── MOBILE TOPBAR ──────────────────────── -->
    <div class="topbar">
      <button class="topbar-toggle" id="mobileToggle" aria-label="Abrir menú">
        <i class="bi bi-list"></i>
      </button>
      <span class="topbar-title">Portal Médico</span>
    </div>

    <!-- ── OVERLAY ────────────────────────────── -->
    <div class="sidebar-overlay" id="overlay"></div>

    <!-- ── SIDEBAR ────────────────────────────── -->
    <aside class="sidebar" id="sidebar">
      <!-- Header -->
      <div class="sidebar-header">
        <div class="sidebar-logo"><i class="bi bi-hospital"></i></div>
        <div class="sidebar-brand">
          <h6>Portal Médico</h6>
          <small>Sede Central Lima</small>
        </div>
      </div>

      <!-- Nav -->
      <nav class="sidebar-nav">
        <ul class="list-unstyled mb-0">
          <li><div class="nav-label">Pacientes</div></li>

          <li class="nav-item">
            <a class="nav-link-item" href="/paciente" data-page="citas">
              <i class="bi bi-calendar3"></i>
              <span>Mis Citas</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              class="nav-link-item"
              href="/paciente/reserva-cita"
              data-page="reserva-cita"
            >
              <i class="bi bi-people"></i>
              <span>Agendar cita</span>
            </a>
          </li>

          <li><div class="nav-label">Médico</div></li>

          <li class="nav-item">
            <a
              class="nav-link-item"
              href="/medicos/historial"
              data-page="historial"
            >
              <i class="bi bi-clipboard2-pulse"></i>
              <span>Historial Médico</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Footer -->
      <div class="sidebar-footer">
        <!-- <a href="#" class="btn-logout">
          <i class="bi bi-plus-circle"></i>
          <span>Nueva Consulta</span>
        </a> -->
        <a href="#" class="btn-nueva-consulta">
          <i class="bi bi-box-arrow-right"></i>
          <span>Cerrar Sesión</span>
        </a>
      </div>
    </aside>

    <!-- ── MAIN CONTENT (demo) ───────────────── -->
    <main layout:fragment="content"></main>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{/js/sidebar.js}"></script>
  </body>
</html>
