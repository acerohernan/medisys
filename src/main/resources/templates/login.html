<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar sesión | Medisys</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h3 class="card-title text-center mb-4">Iniciar sesión</h3>

              <div
                th:if="${errorMessage}"
                class="alert alert-danger"
                th:text="${errorMessage}"
              ></div>
              <div
                th:if="${logoutMessage}"
                class="alert alert-success"
                th:text="${logoutMessage}"
              ></div>
              <div
                th:if="${expiredMessage}"
                class="alert alert-warning"
                th:text="${expiredMessage}"
              ></div>

              <form th:action="@{/login}" method="post">
                <!-- CSRF Token (requerido por Spring Security) -->
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <div class="mb-3">
                  <label for="username" class="form-label"
                    >Correo electrónico</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="username"
                    name="username"
                    placeholder="usuario@ejemplo.com"
                    required
                    autofocus
                  />
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Contraseña</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    placeholder="Contraseña"
                    required
                  />
                </div>
                <button type="submit" class="btn btn-primary w-100">
                  Acceder
                </button>
              </form>

              <hr class="my-3" />

              <p class="text-center mb-0">
                ¿No tienes cuenta?
                <a href="/registro" class="btn btn-outline-primary btn-sm">
                  Registrarse aquí
                </a>
              </p>
            </div>
          </div>
          <p class="text-center text-muted mt-3">
            Usuario de prueba: <strong>admin@medisys.com</strong> /
            <strong>Admin123!</strong>
          </p>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
