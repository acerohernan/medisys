<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediSys – Inicio de sesión</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="login-card">
      <div class="panel-image">
        <div class="panel-image-content">
          <div class="brand">MediSys</div>
          <p>
            Innovación tecnológica para una atención médica excepcional.
            Bienvenido al portal de MediSys.
          </p>
        </div>
      </div>

      <form class="panel-form" th:action="@{/login}" method="post">
        <div class="form-title">
          <div class="icon-wrap">
            <i class="bi bi-hospital-fill text-white"></i>
          </div>
          Inicio de sesión
        </div>

        <div
          th:if="${errorMessage}"
          class="alert alert-danger"
          th:text="${errorMessage}"
        ></div>
        <div
          th:if="${logoutMessage}"
          class="alert alert-success"
          th:text="${logoutMessage}"
        ></div>

        <!-- CSRF Token (requerido por Spring Security) -->
        <input
          type="hidden"
          th:name="${_csrf.parameterName}"
          th:value="${_csrf.token}"
        />
        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Correo Electrónico</label>
          <div class="input-group-custom">
            <span class="input-icon">
              <i class="bi bi-envelope"></i>
            </span>
            <input
              type="email"
              autocomplete="email"
              class="form-control"
              id="username"
              name="username"
              placeholder="usuario@ejemplo.com"
              required
              autofocus
            />
          </div>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <div class="input-group-custom">
            <span class="input-icon">
              <i class="bi bi-lock"></i>
            </span>
            <input
              type="password"
              class="form-control"
              placeholder="••••••••"
              autocomplete="current-password"
              id="password"
              name="password"
            />
          </div>
        </div>

        <!-- Remember me -->
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="remember" />
          <label class="form-check-label" for="remember">Recordarme</label>
        </div>

        <!-- Submit -->
        <button class="btn-ingresar" type="submit">
          Ingresar
          <i class="bi bi-box-arrow-in-right"></i>
        </button>

        <div class="divider"></div>

        <p class="new-patient-label">¿Eres un nuevo paciente?</p>
        <a class="btn-register text-decoration-none" href="/registro"
          >Registrarse como paciente</a
        >
      </form>
    </div>

    <p class="footer-text">© 2026 MediSys · Todos los derechos reservados</p>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
